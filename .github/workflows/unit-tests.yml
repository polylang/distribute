name: Unit Tests

on:
  push:
    branches: master
  pull_request:
    branches: master
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest

    name: Prepare

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch base branch
      if: github.event_name == 'pull_request'
      run: git fetch origin "${{ github.base_ref }}"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

  test:
    runs-on: ubuntu-latest
    needs: prepare

    name: Jest Unit Tests

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4

    # Each job runs on a separate runner, so node_modules is not shared between jobs.
    # setup-node cache: npm restores dependencies quickly using the cache warmed by prepare.
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run Jest unit tests
      run: npm run test:unit

  coverage:
    runs-on: ubuntu-latest
    needs: prepare

    name: Coverage

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch base branch
      if: github.event_name == 'pull_request'
      run: git fetch origin "${{ github.base_ref }}"

    # Each job runs on a separate runner, so node_modules is not shared between jobs.
    # setup-node cache: npm restores dependencies quickly using the cache warmed by prepare.
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run Jest unit tests with coverage
      run: npm run test:coverage

    - name: Enforce coverage on changed source files
      run: npm run test:coverage:changed
      env:
        COVERAGE_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
