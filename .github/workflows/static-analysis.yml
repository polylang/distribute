name: Static Analysis

on:
  push:
    branches: master
  pull_request:
    branches: master
  workflow_dispatch:
  workflow_call:

jobs:
  js:
    name: Lint and Test

    runs-on: ubuntu-latest

    steps:
    - name: Check out the source code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run Jest unit tests
      run: npm run test:unit
